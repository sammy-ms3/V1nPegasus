<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B1 英文單字學習助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FFF9F3;
            --card-bg: #FFFFFF;
            --primary-btn: #A8E6CF;
            --primary-btn-hover: #98DBBF;
            --text-main: #4A4A4A;
            --text-secondary: #7A7A7A;
            --accent-color: #FF8B94;
            --shadow: 0 10px 30px rgba(168, 230, 207, 0.2);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            flex: 1;
        }

        header {
            text-align: center;
            margin-top: 20px;
            width: 100%;
        }

        h1 {
            font-size: 1.8rem;
            color: #5D4037;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .mode-selector {
            display: flex;
            gap: 12px;
            width: 100%;
            justify-content: center;
            margin-bottom: 10px;
        }

        .btn-mode {
            padding: 10px 20px;
            border-radius: 50px;
            border: none;
            background: white;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: var(--transition);
            font-weight: 500;
        }

        .btn-mode.active {
            background: var(--primary-btn);
            color: #2F5D62;
            box-shadow: 0 4px 15px rgba(168, 230, 207, 0.4);
        }

        .card-wrapper {
            width: 100%;
            perspective: 1000px;
            cursor: pointer;
            min-height: 350px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px 30px;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
            border: 1px solid rgba(168, 230, 207, 0.1);
        }

        .word-display {
            font-size: 2.8rem;
            font-weight: 700;
            color: #2F5D62;
            margin-bottom: 20px;
            word-break: break-word;
        }

        .details {
            width: 100%;
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition);
            pointer-events: none;
        }

        .details.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .translation-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .btn-voice {
            background: #F0F8F5;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #2F5D62;
            transition: var(--transition);
        }

        .btn-voice:hover {
            background: var(--primary-btn);
            transform: scale(1.1);
        }

        .translation {
            font-size: 1.4rem;
            color: #5D4037;
            font-weight: 500;
        }

        .example {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.6;
            background: #F9FBFA;
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--primary-btn);
            text-align: left;
        }

        .search-container {
            display: flex;
            width: 100%;
            gap: 10px;
            margin-bottom: 15px;
            margin-top: 10px;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1.5px solid #E0E0E0;
            outline: none;
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--primary-btn);
            box-shadow: 0 0 10px rgba(168, 230, 207, 0.3);
        }

        .btn-search {
            width: 50px;
            height: 50px;
            background: var(--primary-btn);
            border: none;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #2F5D62;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .btn-search:hover {
            background: var(--primary-btn-hover);
            transform: translateY(-2px);
        }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            gap: 20px;
            margin-top: 0;
            margin-bottom: 30px;
        }

        .btn-nav {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: var(--primary-btn);
            color: #2F5D62;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.05);
        }

        .btn-nav:active {
            transform: scale(0.95);
        }

        .btn-nav:hover {
            background: var(--primary-btn-hover);
        }

        .btn-nav:disabled {
            background: #E0E0E0;
            color: #9E9E9E;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 清除記憶按鈕樣式 */
        .btn-reset {
            background: transparent;
            color: var(--accent-color);
            border: 1.5px solid var(--accent-color);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
            opacity: 0.8;
        }

        .btn-reset:hover {
            background: var(--accent-color);
            color: white;
            opacity: 1;
            box-shadow: 0 4px 15px rgba(255, 139, 148, 0.3);
        }

        footer {
            margin-top: 40px;
            margin-bottom: 20px;
            font-size: 0.75rem;
            color: #A0A0A0;
            text-align: center;
            opacity: 0.8;
        }

        .progress {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: -10px;
        }

        @media (max-width: 480px) {
            .word-display { font-size: 2.2rem; }
            .container { padding: 16px; }
            .card { padding: 30px 20px; min-height: 400px; }
        }

        .card.next-animation {
            animation: nextSlide 0.4s forwards;
        }

        @keyframes nextSlide {
            0% { opacity: 1; transform: translateX(0); }
            50% { opacity: 0; transform: translateX(-50px); }
            51% { opacity: 0; transform: translateX(50px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .hint-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 15px;
            font-style: italic;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>B1 VOC 學習助手</h1>
            <div class="progress" id="progressText">0 / 0</div>
        </header>

        <div class="mode-selector">
            <button id="btnSeq" class="btn-mode active">順序模式</button>
            <button id="btnRand" class="btn-mode">隨機模式</button>
        </div>

        <div class="card-wrapper" id="cardTrigger">
            <div class="card" id="mainCard">
                <div class="word-display" id="wordText">Loading...</div>
                <div class="details" id="detailsArea">
                    <div class="translation-container">
                        <button class="btn-voice" id="btnVoice" title="聽發音">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
                        </button>
                        <div class="translation" id="transText"></div>
                    </div>
                    <div class="example" id="exampleText"></div>
                </div>
                <div class="hint-text" id="hint">點擊卡片顯示解釋</div>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="搜尋單字 (例如: apple)...">
            <button class="btn-search" id="btnSearch" title="開始搜尋">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
        </div>

        <div class="nav-controls">
            <button class="btn-nav" id="btnPrev">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                上一個
            </button>
            <button class="btn-nav" id="btnNext">
                下一個
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </div>
        <button class="btn-reset" id="btnReset">清除記憶 (回到起點)</button>
        <footer>Copyright © 2026 Validation Lab - 米米米</footer>
    </div>

        const exampleText = document.getElementById('exampleText');
        const detailsArea = document.getElementById('detailsArea');
        const progressText = document.getElementById('progressText');
        const cardTrigger = document.getElementById('cardTrigger');
        const mainCard = document.getElementById('mainCard');
        const btnSeq = document.getElementById('btnSeq');
        const btnRand = document.getElementById('btnRand');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const hint = document.getElementById('hint');
        const btnVoice = document.getElementById('btnVoice');

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function updateCard(skipAnimation = false) {
            if (currentIndex < 0 || currentIndex >= rawData.length) currentIndex = 0;
            
            const dataIndex = displayOrder[currentIndex];
            const item = rawData[dataIndex];
            
            // 僅在非隨機模式下自動儲存進度
            if (!isRandomMode) {
                try {
                    localStorage.setItem(STORAGE_KEY, currentIndex);
                } catch (e) {}
            }

            // 如果跳過動畫 (初次載入)，立即更新數據
            if (skipAnimation) {
                if (item) {
                    wordText.innerText = item.word || '';
                    transText.innerText = item.translation || '';
                    exampleText.innerText = item.example || '';
                }
                progressText.innerText = (currentIndex + 1) + " / " + rawData.length;
                btnPrev.disabled = currentIndex === 0;
                btnNext.disabled = currentIndex === rawData.length - 1;
                isRevealed = false;
                detailsArea.classList.remove('show');
                hint.style.opacity = '1';
                return;
            }
            
            mainCard.classList.remove('next-animation');
            void mainCard.offsetWidth; 
            mainCard.classList.add('next-animation');
            
            setTimeout(() => {
                if (!item) return;
                wordText.innerText = item.word || '';
                transText.innerText = item.translation || '';
                exampleText.innerText = item.example || '';
                
                isRevealed = false;
                detailsArea.classList.remove('show');
                hint.style.opacity = '1';
                
                progressText.innerText = (currentIndex + 1) + " / " + rawData.length;
                btnPrev.disabled = currentIndex === 0;
                btnNext.disabled = currentIndex === rawData.length - 1;
            }, 200);
        }

        cardTrigger.addEventListener('click', () => {
            isRevealed = !isRevealed;
            if (isRevealed) {
                detailsArea.classList.add('show');
                hint.style.opacity = '0';
            } else {
                detailsArea.classList.remove('show');
                hint.style.opacity = '1';
            }
        });

        btnSeq.addEventListener('click', () => {
            if (!isRandomMode) return;
            isRandomMode = false;
            btnSeq.classList.add('active');
            btnRand.classList.remove('active');
            displayOrder = [...Array(rawData.length).keys()];
            
            // 從儲存中重新讀取順序模式的記憶進度
            currentIndex = getInitialIndex();
            updateCard();
        });

        btnRand.addEventListener('click', () => {
            if (isRandomMode) return;
            isRandomMode = true;
            btnRand.classList.add('active');
            btnSeq.classList.remove('active');
            shuffle(displayOrder);
            currentIndex = 0;
            updateCard();
        });

        btnNext.addEventListener('click', (e) => {
            e.stopPropagation();
            if (currentIndex < rawData.length - 1) {
                currentIndex++;
                updateCard();
            }
        });

        btnPrev.addEventListener('click', (e) => {
            e.stopPropagation();
            if (currentIndex > 0) {
                currentIndex--;
                updateCard();
            }
        });

        // 發音功能 (正常語速並過濾括號內容)
        btnVoice.addEventListener('click', (e) => {
            e.stopPropagation();
            let text = document.getElementById('wordText').innerText;
            if (text && text !== 'Loading...') {
                // 移除括號內的文字以及可能的中文括號內容
                text = text.replace(/\s*[\(\（].*?[\)\）]/g, '').trim();
                
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'en-US';
                utter.rate = 1.0; 
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utter);
            }
        });

        // 搜尋功能邏輯
        const searchInput = document.getElementById('searchInput');
        const btnSearch = document.getElementById('btnSearch');

        function performSearch() {
            const query = searchInput.value.trim().toLowerCase();
            if (!query) return;

            // 在原始資料中尋找匹配的單字索引
            const targetIndex = rawData.findIndex(item => {
                const word = item.word.toLowerCase();
                // 移除括號後的純單字比對
                const pureWord = word.replace(/\s*[\(\（].*?[\)\）]/g, '').trim();
                return word === query || pureWord === query || word.startsWith(query);
            });

            if (targetIndex !== -1) {
                // 若在隨機模式，則切換回順序模式再跳轉
                if (isRandomMode) {
                    btnSeq.click();
                }
                
                currentIndex = targetIndex;
                updateCard();
                searchInput.value = ''; // 搜尋成功後清空
                searchInput.blur();
            }
        }

        btnSearch.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        const btnReset = document.getElementById('btnReset');
        btnReset.addEventListener('click', () => {
            if (confirm('確定要清除目前的進度，回到第一個單字嗎？')) {
                try {
                    localStorage.removeItem(STORAGE_KEY);
                    console.log('[B1VOC] 記憶已清除');
                } catch (e) {}
                currentIndex = 0;
                if (isRandomMode) {
                    btnSeq.click();
                } else {
                    updateCard();
                }
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                cardTrigger.click();
            } else if (e.code === 'ArrowRight') {
                btnNext.click();
            } else if (e.code === 'ArrowLeft') {
                btnPrev.click();
            }
        });

        // 修正：立即執行第一次更新，且不帶動畫效果
        updateCard(true);

        window.addEventListener('load', () => {
            console.log('[B1VOC] 網頁啟動完成');
        });
    </script>
</body>
</html>
